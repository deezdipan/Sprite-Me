<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🥤</div>
    <h1 class="auth-title">Sprite-Me</h1>
    <p class="auth-subtitle">Create your account.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="new-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-hint>Minimum 6 characters</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm Password</mat-label>
        <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword" autocomplete="new-password" />
        <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm">
          <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (passwordMismatch) {
          <mat-error>Passwords do not match</mat-error>
        }
      </mat-form-field>

      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }
      @if (success) {
        <div class="success-msg">{{ success }}</div>
      }

      <button
        mat-flat-button
        class="auth-btn"
        type="submit"
        [disabled]="form.invalid || loading"
      >
        @if (loading) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Create Account
        }
      </button>
    </form>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
