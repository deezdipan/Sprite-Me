<h2 mat-dialog-title class="modal-title">🥤 Add a Drink</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="modal-form">

    <!-- Container Type -->
    <p class="field-label">Container</p>
    <mat-button-toggle-group formControlName="type" class="type-toggle">
      @for (c of containers; track c) {
        <mat-button-toggle [value]="c">
          {{ containerEmoji[c] }} {{ c }}
        </mat-button-toggle>
      }
    </mat-button-toggle-group>

    <!-- Quantity -->
    <mat-form-field appearance="outline" class="full-width qty-field">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" min="1" max="20" />
      <mat-hint>1 – 20 units</mat-hint>
    </mat-form-field>

    <!-- Backdate Toggle -->
    <div class="backdate-row">
      <mat-slide-toggle formControlName="isBackdated" color="primary">
        Log for a different time
      </mat-slide-toggle>
    </div>

    <!-- Conditional Date/Time -->
    @if (isBackdated) {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="logged_at" />
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    }

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close class="cancel-btn">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="save()"
    [disabled]="form.invalid || saving"
    class="save-btn"
  >
    {{ saving ? 'Saving…' : 'Save Drink' }}
  </button>
</mat-dialog-actions>
