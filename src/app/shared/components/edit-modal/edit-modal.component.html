<h2 mat-dialog-title class="modal-title">✏️ Edit Entry</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="modal-form">

    <p class="field-label">Container</p>
    <mat-button-toggle-group formControlName="type" class="type-toggle">
      @for (c of containers; track c) {
        <mat-button-toggle [value]="c">
          {{ containerEmoji[c] }} {{ c }}
        </mat-button-toggle>
      }
    </mat-button-toggle-group>

    <mat-form-field appearance="outline" class="full-width qty-field">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" min="1" max="20" />
      <mat-hint>1 – 20 units</mat-hint>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close class="cancel-btn">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="save()"
    [disabled]="form.invalid || saving"
    class="save-btn"
  >
    {{ saving ? 'Saving…' : 'Save Changes' }}
  </button>
</mat-dialog-actions>
